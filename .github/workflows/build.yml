name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'
    
    - name: Build SnakeClient
      run: dotnet publish SnakeClient -c Release -r linux-x64 --self-contained -o ./publish/client
    
    - name: Build SnakeOrchestrator
      run: dotnet publish SnakeOrchestrator -c Release -r linux-x64 --self-contained -o ./publish/orchestrator
    
    - name: Zip SnakeClient
      run: zip -r snake-client.zip ./publish/client
    
    - name: Zip SnakeOrchestrator
      run: zip -r snake-orchestrator.zip ./publish/orchestrator
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          snake-client.zip
          snake-orchestrator.zip